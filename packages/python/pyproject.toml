[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "helix-noise"
version = "0.1.0"
description = "Spectral, divergence-free helical flow-field generator (numpy port of the JS helix-noise library)."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [{ name = "Rifat Jumagulov" }]
keywords = ["noise", "flow-field", "curl-noise", "procedural", "graphics", "vector-field", "glsl"]
dependencies = ["numpy>=1.20"]

[project.urls]
Homepage = "https://github.com/rifmj/helix-noise"
Repository = "https://github.com/rifmj/helix-noise"

[project.optional-dependencies]
test = ["pytest"]

[tool.setuptools.packages.find]
include = ["helix_noise*"]
