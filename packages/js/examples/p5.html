<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helix Noise — p5.js flow field</title>
<style>
  html,body{margin:0;background:#070a0e;color:#cdd6dd;font-family:system-ui,sans-serif}
  .wrap{max-width:820px;margin:0 auto;padding:22px 16px}
  h1{font-size:18px;font-weight:600;margin:0 0 6px}
  p{color:#8a97a2;font-size:13.5px;line-height:1.6;margin:0 0 14px}
  code{font-family:ui-monospace,Menlo,monospace;color:#f4a13c;font-size:12.5px}
  main{border:1px solid rgba(150,180,200,.15);border-radius:10px;overflow:hidden;line-height:0}
  canvas{display:block;width:100%!important;height:auto!important}
  .note{margin-top:12px;font-size:12px;color:#5d6b77;font-family:ui-monospace,monospace}
</style>
</head>
<body>
<div class="wrap">
  <h1>Helix Noise in <code>p5.js</code></h1>
  <p>A classic flow-field sketch: thousands of agents advected through a 2-D slice of the field with
    <code>field.sample(x, y, 0)</code>, coloured by helicity. Helix Noise is renderer-agnostic — in p5
    it's three lines. (Loads p5.js from a CDN.)</p>
  <main id="host"></main>
  <div class="note">field.sample() drives every agent · p5.js 1.9</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<script src="../dist/helix-noise.global.js"></script>
<script>
  const TAU = Math.PI * 2, N = 4000;
  let field, xs, ys, W, H;

  function setup(){
    const host = document.getElementById("host");
    W = host.clientWidth; H = Math.round(W * 9 / 16);
    const c = createCanvas(W, H); c.parent(host);
    pixelDensity(1);
    field = HelixNoise.create({ modes: 40, slope: 1.6, helicity: 0.75, coherence: 0.5, seed: 4 });
    xs = new Float32Array(N); ys = new Float32Array(N);
    for (let i=0;i<N;i++){ xs[i]=Math.random()*TAU; ys[i]=Math.random()*TAU; }
    background(7,10,14);
    strokeWeight(1.1);
  }

  const uw = [0,0,0,0,0,0];
  function draw(){
    noStroke(); fill(7,10,14,26); rect(0,0,W,H);   // trail fade
    blendMode(ADD);
    const sx = W/TAU, sy = H/TAU;
    for (let i=0;i<N;i++){
      const x = xs[i], y = ys[i];
      field.sampleUW(x, y, 0, uw);
      const h = uw[0]*uw[3] + uw[1]*uw[4] + uw[2]*uw[5];
      const nx = ((x + uw[0]*0.09) % TAU + TAU) % TAU;
      const ny = ((y + uw[1]*0.09) % TAU + TAU) % TAU;
      if (Math.abs(nx-x) < TAU*0.5 && Math.abs(ny-y) < TAU*0.5){
        if (h >= 0) stroke(47,214,191,150); else stroke(244,161,60,150);
        line(x*sx, y*sy, nx*sx, ny*sy);
      }
      xs[i]=nx; ys[i]=ny;
      if (Math.random() < 0.004){ xs[i]=Math.random()*TAU; ys[i]=Math.random()*TAU; }
    }
    blendMode(BLEND);
  }
</script>
</body>
</html>
