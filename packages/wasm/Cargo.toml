[package]
name = "helix-noise-wasm"
version = "0.1.1"
edition = "2021"
license = "MIT"
authors = ["Rifat Jumagulov"]
description = "WebAssembly bindings for helix-noise — divergence-free helical (Beltrami) flow-field noise, compiled from the Rust core with wasm-bindgen. Spectral + sparse-atom engines."
keywords = ["noise", "wasm", "flow-field", "curl-noise", "webassembly"]
categories = ["wasm", "graphics", "game-development"]
repository = "https://github.com/rifmj/helix-noise"
readme = "README.md"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
helix-noise = { path = "../rust", version = "0.2" }
wasm-bindgen = "0.2"
js-sys = "0.3"

# A slim, fast .wasm: optimize for size and strip the panic machinery.
[profile.release]
opt-level = "s"
lto = true
panic = "abort"
codegen-units = 1
