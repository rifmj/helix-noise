name: Deploy Site

# Publishes a single GitHub Pages site:
#   /            -> the marketing landing + demos (packages/js/index.html, gallery, sandbox, examples)
#   /docs/       -> the VitePress documentation
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "packages/js/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated needs full git history
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/js/package-lock.json
      - uses: actions/configure-pages@v5

      - name: Install deps
        working-directory: packages/js
        run: npm ci

      - name: Build the VitePress docs
        working-directory: packages/js
        run: npm run docs:build

      - name: Assemble the Pages site (landing at /, docs at /docs)
        run: |
          set -e
          SITE="$RUNNER_TEMP/_site"
          SRC=packages/js
          rm -rf "$SITE" && mkdir -p "$SITE"
          # Project landing (site/) -> site root
          cp site/index.html "$SITE/"
          # Demos + the assets/dist they reference (they belong with the JS package) -> site root
          cp "$SRC/gallery.html" "$SRC/sandbox.html" "$SITE/"
          cp -R "$SRC/examples" "$SRC/assets" "$SRC/dist" "$SITE/"
          # VitePress output (built with base /helix-noise/docs/) -> /docs
          mkdir -p "$SITE/docs"
          cp -R "$SRC/docs/.vitepress/dist/." "$SITE/docs/"
          echo "Assembled site:"; find "$SITE" -maxdepth 1 | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
