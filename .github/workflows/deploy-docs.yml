name: Deploy Docs

# Build the VitePress site in packages/js and publish it to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - "packages/js/docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel in-progress production deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated needs full git history
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/js/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
      - name: Build with VitePress
        run: npm run docs:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/js/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
