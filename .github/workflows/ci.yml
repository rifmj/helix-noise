name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js:
    name: JS reference (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: packages/js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/js/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  python:
    name: Python port
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    defaults:
      run:
        working-directory: packages/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m pip install numpy pytest
      - run: python -m pytest -q
      - run: python tests/test_parity.py

  rust:
    name: Rust port
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo build --release

  wasm:
    name: WASM artifact (Rust → wasm-bindgen)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build --target web --out-dir pkg
      - name: WASM numerical parity vs the JS reference
        run: node tests/parity.test.mjs

  shaders:
    name: Shader generator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shaders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python tests/test_shaders.py

  r3f:
    name: r3f adapter (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    defaults:
      run:
        working-directory: packages/r3f
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No lockfile yet (0.1.0) → npm install, not npm ci. Depends on packages/js via
      # file:../js; packages/js/dist is committed, so no core build step is needed.
      - run: npm install
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  parity-fixture:
    name: Fixture is in sync (no drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/js/package-lock.json
      - run: npm ci
        working-directory: packages/js
      - run: npm run build
        working-directory: packages/js
      - name: Every package copy is byte-identical to spec/ (copy drift)
        run: |
          set -e
          fail=0
          for f in packages/python/tests/parity_fixture.json \
                   packages/rust/tests/parity_fixture.json \
                   packages/shaders/tests/parity_fixture.json \
                   packages/wasm/tests/parity_fixture.json; do
            if ! diff -q spec/parity_fixture.json "$f" >/dev/null; then
              echo "::error file=$f::copy differs from spec/parity_fixture.json — re-sync it"
              fail=1
            fi
          done
          exit $fail
      - name: spec/ still matches the JS oracle within parity tolerance (algorithm drift)
        # The oracle is regenerated on this runner; floats differ by ~1 ULP across
        # platforms, so compare NUMERICALLY (1e-9), never byte-for-byte.
        run: |
          node packages/js/scripts/dump-fixture.mjs > /tmp/oracle.json
          node spec/compare-fixture.mjs /tmp/oracle.json spec/parity_fixture.json 1e-9 1e-9
